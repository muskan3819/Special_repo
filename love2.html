<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2 Months Engagement Certificate</title>

    <link rel="stylesheet" href="./css/love2.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Floating Hearts -->

    <div class="heart h1">❤</div>
    <div class="heart h2">💖</div>
    <div class="heart h3">💕</div>
    <div class="heart h4">💗</div>

    <!-- Certificate -->

    <div class="certificate">

        <div class="ring">💍</div>

        <h3>Love Certificate</h3>

        <h1>2 Beautiful Months</h1>

        <p class="line"></p>

        <div class="couple">

            <div class="person">

                <div class="emoji">⚖️</div>

                <h2>Saif</h2>

                <p>Advocate 👨🏻‍⚖️</p>

            </div>

            <div class="love">💖</div>

            <div class="person">

                <div class="emoji">💻</div>

                <h2>Muskan</h2>

                <p>Coding 👩🏻‍💻</p>

            </div>

        </div>

        <div class="message">

            <p>
                From the day we got engaged 💍
                every moment has become more beautiful.
                These 2 months are filled with
                love ❤️ trust 🤝 care 🌸
                and endless happiness ✨
            </p>

        </div>

        <div class="bottom">

            <div>2 Months Together</div>

            <div>💞 Forever to Go 💞</div>

        </div>

    </div>

</body>

</html>
